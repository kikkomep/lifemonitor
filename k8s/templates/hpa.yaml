{{- if .Values.lifemonitor.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "chart.fullname" . }}
  minReplicas: {{ .Values.lifemonitor.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.lifemonitor.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.lifemonitor.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.lifemonitor.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.lifemonitor.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.lifemonitor.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
